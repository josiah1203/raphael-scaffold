name: Integration

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install httpx
        run: uv pip install httpx
      - name: Run smoke test
        run: python3 raphael-scaffold/smoke-test.py
        working-directory: ${{ github.workspace }}
