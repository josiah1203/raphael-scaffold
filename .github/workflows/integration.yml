name: Integration

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Checkout sibling repos
        run: python3 checkout-polyrepo.py
        env:
          RAPHAEL_PROJECTS_ROOT: ${{ github.workspace }}
      - name: Install httpx
        run: uv pip install httpx
      - name: Run smoke test
        run: python3 smoke-test.py
        env:
          RAPHAEL_PROJECTS_ROOT: ${{ github.workspace }}
          RAPHAEL_MODEL_BACKEND: stub
